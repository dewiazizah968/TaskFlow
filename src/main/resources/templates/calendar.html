<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${user.themeMode}">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow - Calendar</title>
    <link rel="stylesheet" th:href="@{/css/calendar.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- MAIN AREA -->
    <div class="main-area">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-title">
                <h1>Calendar</h1>
                <p>Track your tasks and deadlines</p>
            </div>
            <div class="topbar-legend">
                <span class="legend-item">
                    <span class="legend-dot" style="background:#6b7280"></span>To Do
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background:#f59e0b"></span>In Progress
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background:#22c55e"></span>Done
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background:#ef4444"></span>Overdue
                </span>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="calendar-content">
            <div class="calendar-card">
                <div id="calendar"></div>
            </div>
        </main>

    </div>
</div>

<!-- TASK DETAIL MODAL -->
<div id="taskModalOverlay" class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-box">

        <div class="modal-header">
            <div>
                <div class="modal-status-badge" id="modalStatusBadge">Status</div>
                <h2 class="modal-title" id="modalTitle">Task Title</h2>
            </div>
            <button class="modal-close-btn" onclick="closeModal()">✕</button>
        </div>

        <div class="modal-body">
            <div class="modal-row">
                <span class="modal-label">📁 Project</span>
                <span class="modal-value" id="modalProject"></span>
            </div>
            <div class="modal-row">
                <span class="modal-label">🚦 Priority</span>
                <span class="modal-value" id="modalPriority"></span>
            </div>
            <div class="modal-row">
                <span class="modal-label">👤 Assigned To</span>
                <span class="modal-value" id="modalAssigned"></span>
            </div>
            <div class="modal-row">
                <span class="modal-label">📅 Deadline</span>
                <span class="modal-value" id="modalDeadline"></span>
            </div>
        </div>

        <a id="openProjectBtn" href="#" class="modal-open-btn">
            Open Project →
        </a>

    </div>
</div>

<div th:replace="fragments/profile-modal :: profileModal"></div>
<div th:replace="fragments/confirm-modal :: confirmModal"></div>
<div th:replace="fragments/search-popup :: searchPopup"></div>
<div th:replace="fragments/footer :: footer"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const calendarEl = document.getElementById('calendar');

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        height: 'auto',
        headerToolbar: {
            left:   'prev,next today',
            center: 'title',
            right:  'dayGridMonth,timeGridWeek,listMonth'
        },
        buttonText: {
            today: 'Today',
            month: 'Month',
            week:  'Week',
            list:  'List'
        },
        dayMaxEvents: 3,
        eventDisplay: 'block',
        events: function(fetchInfo, successCallback, failureCallback) {
            fetch('/api/calendar/events')
                .then(r => r.json())
                .then(data => {
                    successCallback(data.map(e => ({
                        ...e,
                        backgroundColor: e.color,
                        borderColor: 'transparent',
                        textColor: '#fff'
                    })));
                })
                .catch(failureCallback);
        },
        eventClick: function(info) {
            const e = info.event;
            const d = e.extendedProps;

            document.getElementById('modalTitle').textContent    = e.title;
            document.getElementById('modalProject').textContent  = d.projectName;
            document.getElementById('modalPriority').textContent = d.priority;
            document.getElementById('modalAssigned').textContent = d.assignedUser;
            document.getElementById('modalDeadline').textContent = formatDate(d.deadline);
            document.getElementById('openProjectBtn').href       = '/projects/' + d.projectId;

            const badge = document.getElementById('modalStatusBadge');
            badge.textContent = d.status.replace('_', ' ');
            badge.className   = 'modal-status-badge status-' + d.status;

            document.getElementById('taskModalOverlay').classList.add('show');
        },
        dayCellDidMount: function(arg) {
            /* today highlight handled via CSS .fc-day-today */
        }
    });

    calendar.render();
});

function formatDate(str) {
    if (!str) return '-';
    const d = new Date(str);
    return d.toLocaleDateString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('taskModalOverlay')) closeModal();
}

function closeModal() {
    document.getElementById('taskModalOverlay').classList.remove('show');
}
</script>

</body>
</html>
