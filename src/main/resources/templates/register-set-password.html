<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow - Create Your Password</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="container single-panel">

    <div class="left-panel form-panel" style="width:100%;">

        <div class="title">ALMOST THERE</div>

        <div class="google-verified-banner">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#22c55e" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm-1.2 14.4-4-4 1.4-1.4 2.6 2.6 5.6-5.6 1.4 1.4Z"/>
            </svg>
            <span>
                Your Google account
                <strong th:text="${googleEmail}">name@gmail.com</strong>
                has been verified. Create a password to finish setting up your TaskFlow account.
            </span>
        </div>

        <form id="google-set-password-form" novalidate>

            <div class="form-group">
                <label for="gsp-password">Password</label>
                <input type="password"
                       id="gsp-password"
                       name="password"
                       placeholder="At least 6 characters"
                       required>
            </div>

            <div class="form-group">
                <label for="gsp-confirm-password">Confirm Password</label>
                <input type="password"
                       id="gsp-confirm-password"
                       name="confirmPassword"
                       placeholder="Re-enter your password"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">
                <span class="btn-label">Create Account</span>
            </button>

        </form>

    </div>

</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>
