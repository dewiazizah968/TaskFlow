<div th:fragment="footer">
<style>
.tf-footer {
    position: relative;
    background: linear-gradient(135deg, #1e1b3a 0%, #2d1b69 50%, #1e1b3a 100%);
    padding: 36px 40px 24px;
    margin-top: 40px;
    overflow: hidden;
}

/* Animated floating orbs */
.tf-footer-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(55px);
    opacity: 0.18;
    animation: tfOrbFloat 8s ease-in-out infinite;
}
.tf-footer-orb-1 {
    width: 200px; height: 200px;
    background: #6366f1;
    top: -60px; left: -40px;
    animation-delay: 0s;
}
.tf-footer-orb-2 {
    width: 160px; height: 160px;
    background: #a855f7;
    bottom: -50px; right: 60px;
    animation-delay: 2.5s;
}
.tf-footer-orb-3 {
    width: 120px; height: 120px;
    background: #06b6d4;
    top: 10px; right: 30%;
    animation-delay: 5s;
}

@keyframes tfOrbFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-18px) scale(1.08); }
}

/* Particle dots */
.tf-footer-dots {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
}
.tf-dot {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: tfDotTwinkle 4s ease-in-out infinite;
}
@keyframes tfDotTwinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.6); }
}

/* Content */
.tf-footer-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
}

.tf-footer-brand {
    display: flex;
    align-items: center;
    gap: 10px;
}
.tf-footer-logo {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: 0 4px 12px rgba(99,102,241,0.4);
    animation: tfLogoPulse 3s ease-in-out infinite;
}
.tf-footer-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
@keyframes tfLogoPulse {
    0%, 100% { box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
    50%       { box-shadow: 0 4px 22px rgba(168,85,247,0.7); }
}
.tf-footer-name {
    font-size: 16px; font-weight: 800;
    color: #fff; letter-spacing: 0.5px;
}
.tf-footer-name span {
    background: linear-gradient(90deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Animated tagline */
.tf-footer-tagline {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
    letter-spacing: 0.3px;
}

/* Moving wave divider */
.tf-wave {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg,
        transparent 0%,
        #6366f1 20%,
        #a855f7 50%,
        #06b6d4 80%,
        transparent 100%);
    background-size: 200% 100%;
    animation: tfWaveSlide 4s linear infinite;
}
@keyframes tfWaveSlide {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.tf-footer-copy {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
}
.tf-footer-copy strong {
    color: rgba(255,255,255,0.6);
    font-weight: 600;
}
</style>

<footer class="tf-footer">
    <!-- Moving gradient top border -->
    <div class="tf-wave"></div>

    <!-- Glowing orbs -->
    <div class="tf-footer-orb tf-footer-orb-1"></div>
    <div class="tf-footer-orb tf-footer-orb-2"></div>
    <div class="tf-footer-orb tf-footer-orb-3"></div>

    <!-- Twinkling dots -->
    <div class="tf-footer-dots" id="tfFooterDots"></div>

    <div class="tf-footer-inner">
        <div>
            <div class="tf-footer-brand">
                <div class="tf-footer-logo">
                    <img th:src="@{/images/logo.png}" alt="TaskFlow Logo">
                </div>
                <div class="tf-footer-name">Task<span>Flow</span></div>
            </div>
            <div class="tf-footer-tagline">Plan · Prioritize · Achieve</div>
        </div>
        <div class="tf-footer-copy">
            &copy; <strong>2026 TaskFlow</strong> — All rights reserved.
        </div>
    </div>
</footer>

<script>
(function() {
    const container = document.getElementById('tfFooterDots');
    if (!container) return;
    const positions = [
        [15,40],[30,70],[55,20],[72,60],[88,35],[20,85],[45,50],[65,80],[80,15],[10,55]
    ];
    positions.forEach(([left, top], i) => {
        const dot = document.createElement('div');
        dot.className = 'tf-dot';
        dot.style.cssText = `left:${left}%;top:${top}%;animation-delay:${(i * 0.4).toFixed(1)}s`;
        container.appendChild(dot);
    });
})();
</script>
</div>
