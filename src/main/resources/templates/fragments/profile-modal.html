<div th:fragment="profileModal">

<style>
.tf-profile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30, 27, 58, .45);
    z-index: 998;
}

.tf-profile-box {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface, #fff);
    border-radius: 20px;
    width: 400px;
    max-width: 94vw;
    max-height: 88vh;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 24px 60px rgba(99, 102, 241, .2);
    z-index: 999;
}

.tf-profile-topbar {
    background: linear-gradient(90deg, #6366f1, #a855f7);
    height: 5px;
    position: sticky;
    top: 0;
    z-index: 1;
}

.tf-profile-body { padding: 28px 28px 24px; }

.tf-profile-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
}

.tf-profile-title {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tf-profile-close-btn {
    background: var(--bg, #f4f3ff);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-muted, #6b7280);
    display: flex;
    align-items: center;
    justify-content: center;
}

.tf-profile-photo-section { text-align: center; margin-bottom: 22px; }

.tf-profile-avatar-wrap {
    margin: 0 auto 10px;
    width: 80px;
    height: 80px;
    position: relative;
}

.tf-profile-avatar-img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 8px 20px rgba(99, 102, 241, .2);
}

.tf-profile-avatar-initial {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 30px;
    font-weight: 800;
    box-shadow: 0 8px 20px rgba(99, 102, 241, .2);
}

.tf-profile-photo-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 8px 18px;
    border-radius: 24px;
    border: 2px solid #818cf8;
    color: #6366f1;
    font-size: 13px;
    font-weight: 700;
    transition: background .15s, color .15s;
}

.tf-profile-divider {
    height: 1px;
    background: var(--border-color, #e6e4f7);
    margin-bottom: 20px;
}
.tf-profile-divider.tf-mt {
    margin: 20px 0;
}

.tf-profile-field { margin-bottom: 14px; }
.tf-profile-field.tf-mb-16 { margin-bottom: 16px; }

.tf-profile-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-dark, #1e1b3a);
    margin-bottom: 6px;
}

.tf-profile-input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid transparent;
    border-radius: 12px;
    background: var(--input-bg, #f1f0fb);
    font-size: 14px;
    color: var(--text-dark, #1e1b3a);
    transition: border-color .2s, box-shadow .2s;
}

.tf-profile-input.tf-has-eye { padding-right: 40px; }

.tf-profile-input-wrap { position: relative; }

.tf-profile-eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-muted, #a3a0c2);
    padding: 0;
}

.tf-profile-save-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(99, 102, 241, .25);
    transition: transform .15s, box-shadow .2s;
}
.tf-profile-save-btn:hover { transform: translateY(-2px); }

.tf-profile-pw-toggle-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    color: #6366f1;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
}

.tf-profile-reset-link-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted, #6b7280);
    text-decoration: underline;
    padding: 0;
}
</style>

<!-- OVERLAY -->
<div id="profileModalOverlay" class="tf-profile-overlay" onclick="closeProfileModal()"></div>

<!-- MODAL BOX -->
<div id="profileModal" class="tf-profile-box">

    <!-- Header gradient bar -->
    <div class="tf-profile-topbar"></div>

    <div class="tf-profile-body">

        <!-- Title -->
        <div class="tf-profile-title-row">
            <h3 class="tf-profile-title">
                My Profile
            </h3>
            <button onclick="closeProfileModal()" class="tf-profile-close-btn">✕</button>
        </div>

        <!-- Photo section -->
        <div class="tf-profile-photo-section">

            <!-- Avatar display -->
            <div id="modalAvatarWrap" class="tf-profile-avatar-wrap">
                <img id="modalAvatarImg"
                     th:if="${user.profileImagePath != null}"
                     th:src="@{/profile/image}"
                     class="tf-profile-avatar-img">
                <div id="modalAvatarInitial"
                     th:if="${user.profileImagePath == null}"
                     th:text="${#strings.substring(user.name,0,1).toUpperCase()}"
                     th:style="'background:' + ${avatarColor} + ';'"
                     class="tf-profile-avatar-initial">A</div>
            </div>

            <!-- Upload photo -->
            <form id="photoForm" action="/profile/upload" method="post" enctype="multipart/form-data">
                <label for="photoInput" onclick="event.preventDefault();confirmPhotoChange()"
                       class="tf-profile-photo-label">
                    📷 Change Photo
                </label>
                <input id="photoInput" type="file" name="file" accept="image/*"
                       style="display:none;" onchange="confirmPhotoUpload(this)">
            </form>

        </div>

        <!-- Divider -->
        <div class="tf-profile-divider"></div>

        <!-- Name & Email form -->
        <form id="profileInfoForm">
            <div class="tf-profile-field">
                <label class="tf-profile-label">Name</label>
                <input id="modalName" type="text"
                       th:value="${user.name}"
                       placeholder="Your name"
                       class="tf-profile-input"
                       onfocus="this.style.borderColor='#818cf8';this.style.boxShadow='0 0 0 4px rgba(99,102,241,.12)'"
                       onblur="this.style.borderColor='transparent';this.style.boxShadow='none'">
            </div>
            <div class="tf-profile-field tf-mb-16">
                <label class="tf-profile-label">Email</label>
                <input id="modalEmail" type="email"
                       th:value="${user.email}"
                       placeholder="your@email.com"
                       class="tf-profile-input"
                       onfocus="this.style.borderColor='#818cf8';this.style.boxShadow='0 0 0 4px rgba(99,102,241,.12)'"
                       onblur="this.style.borderColor='transparent';this.style.boxShadow='none'">
            </div>
            <button type="button" onclick="confirmSaveProfile()" class="tf-profile-save-btn">
                Save Changes
            </button>
        </form>

        <!-- Divider -->
        <div class="tf-profile-divider tf-mt"></div>

        <!-- Change Password -->
        <div>
            <button onclick="togglePasswordSection()" class="tf-profile-pw-toggle-btn">
                🔒 <span id="pwToggleLabel">Change Password?</span>
            </button>
            <div id="passwordSection" style="display:none;">
                <div class="tf-profile-field">
                    <label class="tf-profile-label">Current Password</label>
                    <div class="tf-profile-input-wrap">
                        <input id="currentPassword" type="password" placeholder="••••••"
                               class="tf-profile-input tf-has-eye"
                               onfocus="this.style.borderColor='#818cf8'"
                               onblur="this.style.borderColor='transparent'">
                        <button type="button" onclick="togglePw('currentPassword',this)"
                                class="tf-profile-eye-btn">👁</button>
                    </div>
                </div>
                <div class="tf-profile-field tf-mb-16">
                    <label class="tf-profile-label">New Password</label>
                    <div class="tf-profile-input-wrap">
                        <input id="newPassword" type="password" placeholder="Min. 6 characters"
                               class="tf-profile-input tf-has-eye"
                               onfocus="this.style.borderColor='#818cf8'"
                               onblur="this.style.borderColor='transparent'">
                        <button type="button" onclick="togglePw('newPassword',this)"
                                class="tf-profile-eye-btn">👁</button>
                    </div>
                </div>
                <button type="button" onclick="confirmChangePassword()" class="tf-profile-save-btn">
                    Update Password
                </button>

                <div style="text-align:center;margin-top:12px;">
                    <input type="hidden" id="modalUserEmail" th:value="${user.email}">
                    <button type="button" onclick="sendProfileResetLink()" class="tf-profile-reset-link-btn">
                        Forgot your current password? Send reset link to email
                    </button>
                </div>
            </div>
        </div>

        <!-- Feedback message -->
        <div id="profileFeedback"
             style="display:none;margin-top:14px;padding:10px 14px;border-radius:10px;
                    font-size:13px;font-weight:600;text-align:center;"></div>

    </div>
</div>

<script>
function openProfileModal() {
    document.getElementById('profileModal').style.display = 'block';
    document.getElementById('profileModalOverlay').style.display = 'block';
}
function closeProfileModal() {
    document.getElementById('profileModal').style.display = 'none';
    document.getElementById('profileModalOverlay').style.display = 'none';
    hideFeedback();
}

function togglePasswordSection() {
    const sec = document.getElementById('passwordSection');
    const label = document.getElementById('pwToggleLabel');
    const open = sec.style.display === 'none';
    sec.style.display = open ? 'block' : 'none';
    label.textContent = open ? 'Hide' : 'Change Password?';
}

function saveProfile() {
    const name  = document.getElementById('modalName').value.trim();
    const email = document.getElementById('modalEmail').value.trim();
    if (!name || !email) { showFeedback('Name and email are required.', 'error'); return; }

    const body = new URLSearchParams({ name, email });
    fetch('/profile/update', { method:'POST', body })
        .then(r => r.json())
        .then(d => showFeedback(d.message || 'Saved!', 'success'))
        .catch(() => showFeedback('Something went wrong.', 'error'));
}

function changePassword() {
    const cur = document.getElementById('currentPassword').value;
    const nw  = document.getElementById('newPassword').value;
    if (!cur || !nw) { showFeedback('Please fill in both password fields.', 'error'); return; }

    const body = new URLSearchParams({ currentPassword: cur, newPassword: nw });
    fetch('/profile/change-password', { method:'POST', body })
        .then(r => r.json())
        .then(d => {
            if (d.message && d.message.includes('incorrect')) {
                showFeedback(d.message, 'error');
            } else {
                showFeedback(d.message || 'Password changed!', 'success');
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
            }
        })
        .catch(() => showFeedback('Something went wrong.', 'error'));
}

function showFeedback(msg, type) {
    const el = document.getElementById('profileFeedback');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = type === 'success' ? '#dcfce7' : '#fee2e2';
    el.style.color = type === 'success' ? '#16a34a' : '#ef4444';
    setTimeout(hideFeedback, 6000);
}
function hideFeedback() {
    const el = document.getElementById('profileFeedback');
    if (el) el.style.display = 'none';
}

function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
}

function confirmPhotoChange() {
    document.getElementById('photoInput').click();
}

function confirmPhotoUpload(input) {
    if (!input.files || !input.files[0]) return;
    const fileName = input.files[0].name;
    showConfirm({
        title: 'Change Profile Photo',
        message: 'Upload "' + fileName + '" as your new profile photo?',
        icon: '📷',
        onConfirm: () => input.form.submit()
    });
}

function confirmSaveProfile() {
    const name  = document.getElementById('modalName').value.trim();
    const email = document.getElementById('modalEmail').value.trim();
    if (!name || !email) { showFeedback('Name and email are required.', 'error'); return; }
    showConfirm({
        title: 'Save Changes',
        message: 'Update your name and email?',
        icon: '💾',
        onConfirm: saveProfile
    });
}

function confirmChangePassword() {
    const cur = document.getElementById('currentPassword').value;
    const nw  = document.getElementById('newPassword').value;
    if (!cur || !nw) { showFeedback('Please fill in both password fields.', 'error'); return; }
    showConfirm({
        title: 'Change Password',
        message: 'Are you sure you want to update your password?',
        icon: '🔒',
        onConfirm: changePassword
    });
}

function sendProfileResetLink() {
    const email = document.getElementById('modalUserEmail').value;
    showConfirm({
        title: 'Send Reset Link',
        message: 'Send a password reset link to ' + email + '? The link expires in 30 minutes and can only be used once.',
        icon: '📧',
        onConfirm: () => {
            fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
            })
                .then((r) => r.json().catch(() => ({})))
                .then((d) => showFeedback(d.message || "If that email is registered, we've sent a reset link.", 'success'))
                .catch(() => showFeedback('Something went wrong.', 'error'));
        }
    });
}
</script>

</div>
