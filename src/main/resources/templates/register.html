<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow - Register</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="container">

    <!-- FORM REGISTER -->
    <div class="left-panel form-panel">

        <div class="title">REGISTER</div>

        <form id="register-form" action="/api/auth/register" method="post" novalidate>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text"
                       id="name"
                       name="name"
                       placeholder="Full name"
                       required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="name@email.com"
                       required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="At least 6 characters"
                       required>
            </div>

            <div class="button-group">

                <button type="submit" class="btn btn-primary">
                    <span class="btn-label">Register</span>
                </button>

                <a href="/login" class="btn btn-secondary">
                    Login
                </a>

            </div>

        </form>

        <div class="divider">or</div>

        <a href="/oauth2/authorization/google" class="btn btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.55-1.85.87-3.04.87-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18Z"/>
                <path fill="#FBBC05" d="M3.97 10.73A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.19.29-1.73V4.94H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.06l3.01-2.33Z"/>
                <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.94l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z"/>
            </svg>
            <span class="btn-label">Register with Google</span>
        </a>

    </div>

    <!-- IMAGE -->
    <div class="right-panel banner-panel">
        <img th:src="@{/images/signup-banner.png}" alt="Register Banner">
    </div>

</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>
