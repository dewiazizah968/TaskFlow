<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow - Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="container single-panel">

    <div class="left-panel form-panel" style="width:100%;">

        <div class="title">RESET PASSWORD</div>

        <div th:if="${!tokenValid}"
             class="google-verified-banner"
             style="background:#fef2f2;border-color:#fecaca;color:#b91c1c;">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#ef4444" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm1 15h-2v-2h2Zm0-4h-2V7h2Z"/>
            </svg>
            <span>
                This reset link is invalid, already used, or has expired. Reset links are only valid for 30 minutes and can only be used once.
                <br><a href="/login" style="color:#b91c1c;font-weight:700;">Back to Login</a> to request a new one.
            </span>
        </div>

        <form id="reset-password-form" th:if="${tokenValid}" novalidate>

            <input type="hidden" id="reset-token" th:value="${token}">

            <div class="form-group">
                <label for="rp-password">New Password</label>
                <input type="password"
                       id="rp-password"
                       name="password"
                       placeholder="At least 6 characters"
                       required>
            </div>

            <div class="form-group">
                <label for="rp-confirm-password">Confirm New Password</label>
                <input type="password"
                       id="rp-confirm-password"
                       name="confirmPassword"
                       placeholder="Re-enter your password"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">
                <span class="btn-label">Reset Password</span>
            </button>

        </form>

    </div>

</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>
